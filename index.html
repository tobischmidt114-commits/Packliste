<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiver Packlisten-Manager</title>
    <style>
        :root {
            /* Apple Liquid Glass Farbschema */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            --text-color: #1d1d1f;
            --text-muted: #515154;
            --primary-color: #0071e3; /* Apple Blau */
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --border-radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Apple-Style Mesh Gradient Hintergrund */
            background-color: #ff9a9e;
            background-image: 
                radial-gradient(at 40% 20%, #f6d365 0px, transparent 50%),
                radial-gradient(at 80% 0%, #fda085 0px, transparent 50%),
                radial-gradient(at 0% 50%, #fbc2eb 0px, transparent 50%),
                radial-gradient(at 80% 50%, #a18cd1 0px, transparent 50%),
                radial-gradient(at 0% 100%, #84fab0 0px, transparent 50%),
                radial-gradient(at 80% 100%, #8fd3f4 0px, transparent 50%),
                radial-gradient(at 0% 0%, #fccb90 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 80px; /* Platz für den fixierten Header */
        }

        /* Glassmorphism Header mit Menü-Button */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        header h1 {
            font-size: 14pt;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .menu-btn {
            position: absolute;
            left: 20px;
            background: none;
            border: none;
            font-size: 18pt;
            color: var(--text-color);
            cursor: pointer;
            display: none; /* Auf großen Bildschirmen versteckt */
            padding: 5px;
            transition: opacity 0.2s;
        }

        .menu-btn:active {
            opacity: 0.5;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--glass-shadow);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 14pt;
            margin-bottom: 15px;
            font-weight: 600;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }

        /* Formular-Styles im iOS-Look */
        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 9pt;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 11pt;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-color);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="date"]:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
        }

        button, .btn-upload {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 11pt;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 113, 227, 0.3);
        }

        button:hover, .btn-upload:hover {
            transform: scale(0.98);
            background: #005bb5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-color);
            box-shadow: none;
            border: 1px solid var(--glass-border);
            margin-bottom: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Listen-Auswahl */
        .list-selector-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border: 1px solid transparent;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .list-selector-item:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .list-selector-item.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 113, 227, 0.3);
        }

        .list-selector-item .info { flex-grow: 1; overflow: hidden; }
        .list-selector-item .title { font-weight: 600; font-size: 11pt; }
        .list-selector-item .meta { font-size: 9pt; opacity: 0.8; margin-top: 2px; }
        .list-selector-item.active .meta { color: rgba(255,255,255,0.8); }

        .btn-delete-small {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14pt;
            box-shadow: none;
            padding: 0;
        }

        .btn-delete-small:hover {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger-color);
            transform: none;
        }

        .list-selector-item.active .btn-delete-small { color: white; }
        .list-selector-item.active .btn-delete-small:hover { background: rgba(255,255,255,0.2); }

        /* Aktive Listenansicht */
        .list-header-details {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .list-tags {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            font-size: 9pt;
        }

        .tag-block {
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        /* Gegenstände Hinzufügen */
        .add-item-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-item-form input { flex-grow: 1; }
        .add-item-form button { width: auto; padding: 12px 20px; }

        .items-list { list-style: none; }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .item-row:last-child { border-bottom: none; }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
        }

        /* Custom iOS-like Checkbox */
        .item-row input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            position: relative;
            outline: none;
        }

        .item-row input[type="checkbox"]:checked {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .item-row input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .item-text {
            font-size: 11pt;
            font-weight: 500;
            transition: all 0.2s;
        }

        .item-row.packed .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .hinweise-textarea { resize: vertical; min-height: 100px; }

        .empty-state, .no-selection-notice {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* --- RESPONSIVE & SIDEBAR SLIDER --- */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 101;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        @media (max-width: 900px) {
            .menu-btn {
                display: block;
            }

            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 320px;
                max-width: 85vw;
                height: 100vh;
                background: rgba(255, 255, 255, 0.75);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                z-index: 102;
                padding: 20px;
                padding-top: 70px;
                overflow-y: auto;
                transform: translateX(-100%);
                transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
                box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.show {
                display: block;
                opacity: 1;
            }

            .card {
                background: rgba(255, 255, 255, 0.6); /* Etwas opaker auf Mobile */
            }
        }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" id="menuToggle">☰</button>
    <h1>Packlisten</h1>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="container">
    <div class="main-layout">
        
        <!-- LINKER BEREICH: Sidebar & Erstellung -->
        <div class="sidebar" id="sidebar">
            <div class="card">
                <h2>Neue Liste anlegen</h2>
                <form id="newListForm">
                    <div class="form-group">
                        <label for="listName">Name der Reise / Event</label>
                        <input type="text" id="listName" placeholder="z. B. Sommerurlaub" required>
                    </div>
                    <div class="form-group">
                        <label for="listDate">Datum</label>
                        <input type="date" id="listDate" required>
                    </div>
                    <div class="form-group">
                        <label for="listPurpose">Kategorie</label>
                        <input type="text" id="listPurpose" placeholder="z. B. Sportturnier" required>
                    </div>
                    <button type="submit">Hinzufügen</button>
                </form>
            </div>

            <div class="card">
                <h2>Deine Packlisten</h2>
                <div id="savedListsContainer"></div>
            </div>

            <div class="card">
                <h2>Backup</h2>
                <p style="font-size: 9pt; color: var(--text-muted); margin-bottom: 12px; font-weight: 500;">Speichere deine Listen auf dem Gerät.</p>
                <button type="button" class="btn-secondary" onclick="exportData()">💾 Herunterladen</button>
                <label class="btn-upload btn-secondary" for="importFile" style="margin-bottom:0;">📂 Laden</label>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
            </div>
        </div>

        <!-- RECHTER BEREICH: Aktive Packliste -->
        <div class="content-area" id="activeListWrapper">
            <div class="card no-selection-notice" id="noSelectionNotice">
                Wähle links eine Packliste aus oder erstelle eine neue.
            </div>
            
            <div id="activeListContent" style="display: none;">
                <div class="card">
                    <div class="list-header-details">
                        <h2 id="activeTitle" style="border: none; margin-bottom: 5px; font-size: 20pt;">-</h2>
                        <div class="list-tags">
                            <div class="tag-block">Datum: <strong id="activeDate">-</strong></div>
                            <div class="tag-block">Zweck: <strong id="activePurpose">-</strong></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="activeNotes">Notizen</label>
                        <textarea id="activeNotes" class="hinweise-textarea" placeholder="Hier wichtige Infos eintragen..."></textarea>
                    </div>
                </div>

                <div class="card">
                    <h2>Gegenstände auf der Liste</h2>
                    
                    <form id="addItemForm" class="add-item-form">
                        <input type="text" id="newItemName" placeholder="Neuer Gegenstand..." required>
                        <button type="submit">Add</button>
                    </form>

                    <ul class="items-list" id="itemsListContainer"></ul>
                    <div id="itemsEmptyState" class="empty-state" style="display: none;">
                        Noch keine Gegenstände auf dieser Liste.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let packlisten = JSON.parse(localStorage.getItem('packlisten_data')) || [];
    let activeListId = null;

    // DOM Elemente
    const newListForm = document.getElementById('newListForm');
    const savedListsContainer = document.getElementById('savedListsContainer');
    const activeListContent = document.getElementById('activeListContent');
    const noSelectionNotice = document.getElementById('noSelectionNotice');
    
    const activeTitle = document.getElementById('activeTitle');
    const activeDate = document.getElementById('activeDate');
    const activePurpose = document.getElementById('activePurpose');
    const activeNotes = document.getElementById('activeNotes');
    
    const addItemForm = document.getElementById('addItemForm');
    const newItemName = document.getElementById('newItemName');
    const itemsListContainer = document.getElementById('itemsListContainer');
    const itemsEmptyState = document.getElementById('itemsEmptyState');

    // Sidebar Slider Logik
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('show');
    }

    menuToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    function init() {
        renderSidebar();
        if (packlisten.length > 0) {
            selectList(packlisten[0].id);
        } else {
            showEmptyState();
        }
    }

    function saveData() {
        localStorage.setItem('packlisten_data', JSON.stringify(packlisten));
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function renderSidebar() {
        savedListsContainer.innerHTML = '';
        if (packlisten.length === 0) {
            savedListsContainer.innerHTML = '<div class="empty-state" style="padding: 15px;">Keine Listen vorhanden.</div>';
            return;
        }

        packlisten.forEach(list => {
            const div = document.createElement('div');
            div.className = `list-selector-item ${list.id === activeListId ? 'active' : ''}`;
            
            div.addEventListener('click', (e) => {
                if (e.target.closest('.btn-delete-small')) return;
                selectList(list.id);
                // Schließe Sidebar auf Mobile automatisch nach Auswahl
                if (window.innerWidth <= 900 && sidebar.classList.contains('open')) {
                    toggleSidebar();
                }
            });

            div.innerHTML = `
                <div class="info">
                    <div class="title">${escapeHTML(list.name)}</div>
                    <div class="meta">${formatDate(list.date)} | ${escapeHTML(list.purpose)}</div>
                </div>
                <button type="button" class="btn-delete-small" title="Liste löschen">✕</button>
            `;

            div.querySelector('.btn-delete-small').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteList(list.id);
            });

            savedListsContainer.appendChild(div);
        });
    }

    function selectList(id) {
        activeListId = id;
        const list = packlisten.find(l => l.id === id);
        
        if (!list) {
            showEmptyState();
            return;
        }

        noSelectionNotice.style.display = 'none';
        activeListContent.style.display = 'block';

        activeTitle.textContent = list.name;
        activeDate.textContent = formatDate(list.date);
        activePurpose.textContent = list.purpose;
        activeNotes.value = list.notes || '';

        renderItems(list);
        renderSidebar(); 
    }

    function showEmptyState() {
        activeListId = null;
        noSelectionNotice.style.display = 'block';
        activeListContent.style.display = 'none';
        renderSidebar();
    }

    function renderItems(list) {
        itemsListContainer.innerHTML = '';
        if (!list.items || list.items.length === 0) {
            itemsEmptyState.style.display = 'block';
            return;
        }
        itemsEmptyState.style.display = 'none';

        list.items.forEach(item => {
            const li = document.createElement('li');
            li.className = `item-row ${item.packed ? 'packed' : ''}`;
            
            li.innerHTML = `
                <div class="item-left">
                    <input type="checkbox" ${item.packed ? 'checked' : ''}>
                    <span class="item-text">${escapeHTML(item.name)}</span>
                </div>
                <button type="button" class="btn-delete-small" title="Gegenstand entfernen">✕</button>
            `;

            const checkbox = li.querySelector('input[type="checkbox"]');
            checkbox.addEventListener('change', () => toggleItemPacked(list.id, item.id));
            
            li.querySelector('.item-left').addEventListener('click', (e) => {
                if (e.target !== checkbox) {
                    checkbox.checked = !checkbox.checked;
                    toggleItemPacked(list.id, item.id);
                }
            });

            li.querySelector('.btn-delete-small').addEventListener('click', () => deleteItem(list.id, item.id));

            itemsListContainer.appendChild(li);
        });
    }

    newListForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = 'list-' + Date.now();
        const newList = {
            id: id,
            name: document.getElementById('listName').value,
            date: document.getElementById('listDate').value,
            purpose: document.getElementById('listPurpose').value,
            notes: '',
            items: []
        };

        packlisten.push(newList);
        saveData();
        newListForm.reset();
        selectList(id);
        
        if (window.innerWidth <= 900 && sidebar.classList.contains('open')) {
            toggleSidebar();
        }
    });

    function deleteList(id) {
        if (confirm('Möchtest du diese Packliste wirklich löschen?')) {
            packlisten = packlisten.filter(l => l.id !== id);
            saveData();
            if (activeListId === id) {
                if (packlisten.length > 0) {
                    selectList(packlisten[0].id);
                } else {
                    showEmptyState();
                }
            } else {
                renderSidebar();
            }
        }
    }

    addItemForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!activeListId) return;

        const list = packlisten.find(l => l.id === activeListId);
        if (list) {
            const newItem = {
                id: 'item-' + Date.now(),
                name: newItemName.value,
                packed: false
            };
            if (!list.items) list.items = [];
            list.items.push(newItem);
            saveData();
            newItemName.value = '';
            renderItems(list);
        }
    });

    function toggleItemPacked(listId, itemId) {
        const list = packlisten.find(l => l.id === listId);
        if (list && list.items) {
            const item = list.items.find(i => i.id === itemId);
            if (item) {
                item.packed = !item.packed;
                saveData();
                renderItems(list);
            }
        }
    }

    function deleteItem(listId, itemId) {
        const list = packlisten.find(l => l.id === listId);
        if (list && list.items) {
            list.items = list.items.filter(i => i.id !== itemId);
            saveData();
            renderItems(list);
        }
    }

    activeNotes.addEventListener('input', () => {
        if (!activeListId) return;
        const list = packlisten.find(l => l.id === activeListId);
        if (list) {
            list.notes = activeNotes.value;
            saveData();
        }
    });

    function exportData() {
        if (packlisten.length === 0) {
            alert('Du hast noch keine Listen erstellt, die du speichern könntest.');
            return;
        }
        const dataStr = JSON.stringify(packlisten);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = 'meine_packlisten.json';

        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        document.body.appendChild(linkElement);
        linkElement.click();
        document.body.removeChild(linkElement);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    packlisten = importedData;
                    saveData();
                    init();
                    alert('Packlisten erfolgreich geladen!');
                } else {
                    alert('Die Datei hat das falsche Format.');
                }
            } catch (err) {
                alert('Fehler beim Lesen der Datei. Bitte lade nur die korrekte JSON-Datei hoch.');
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    init();
</script>

</body>
</html>
