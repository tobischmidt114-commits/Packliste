<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiver Packlisten-Manager</title>
    <style>
        :root {
            --primary-color: #3a6073;
            --secondary-color: #3a7bd5;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e2e8f0;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            
            /* Farben für Listeneinträge */
            --item-color-default: #2c3e50;
            --item-color-red: #e74c3c;
            --item-color-blue: #3498db;
            --item-color-green: #2ecc71;
            --item-color-orange: #f39c12;
            --item-color-purple: #9b59b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 24pt;
            margin-bottom: 5px;
        }

        header p {
            font-size: 11pt;
            opacity: 0.9;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 14pt;
            margin-bottom: 15px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 8px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 9.5pt;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 10pt;
            background-color: #fafafa;
        }

        button, .btn-upload {
            width: 100%;
            padding: 11px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 10pt;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-block;
            text-align: center;
        }

        button:hover, .btn-upload:hover {
            background-color: var(--primary-color);
        }

        .btn-secondary {
            background-color: #95a5a6;
            margin-bottom: 10px;
        }
        .btn-secondary:hover { background-color: #7f8c8d; }

        .btn-print {
            background-color: #27ae60;
            margin-bottom: 10px;
        }
        .btn-print:hover { background-color: #2ecc71; }

        .list-selector-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            background-color: #fff;
        }

        .list-selector-item.active {
            background-color: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        .list-selector-item .info {
            flex-grow: 1;
            overflow: hidden;
        }

        .list-selector-item .title { font-weight: bold; font-size: 10.5pt; }
        .list-selector-item .meta { font-size: 8.5pt; opacity: 0.8; }
        .list-selector-item.active .meta { color: #e2e8f0; }

        .btn-delete-small {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: auto;
            padding: 5px;
            font-size: 12pt;
        }
        .btn-delete-small:hover { color: var(--danger-color); }
        .list-selector-item.active .btn-delete-small { color: #fff; }

        .list-header-details {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .list-tags {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-size: 9.5pt;
            color: var(--text-muted);
        }

        .tag-block {
            background-color: var(--bg-color);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Hinzufügen-Formular */
        .add-item-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .add-item-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .add-item-form input[type="text"] { flex-grow: 1; }
        .add-item-form select { width: 150px; }
        
        .color-selector {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-btn.selected { border-color: #333; transform: scale(1.1); }

        .add-item-form button { width: auto; padding: 10px 20px; }

        /* Kategorien-Ansicht */
        .category-group {
            margin-bottom: 20px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .category-header {
            background-color: #f1f5f9;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 11pt;
            border-bottom: 1px solid var(--border-color);
            color: var(--primary-color);
        }

        .items-list { list-style: none; }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .item-row:last-child { border-bottom: none; }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
        }

        .item-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .item-text {
            font-size: 10.5pt;
            font-weight: 500;
        }

        .item-row.packed .item-text {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .hinweise-textarea { resize: vertical; min-height: 80px; font-family: inherit; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-style: italic;
        }

        .no-selection-notice {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            color: var(--text-muted);
            font-style: italic;
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            background: #fff;
        }

        /* DRUCK-LAYOUT */
        @media print {
            body { 
                background: white; 
                padding: 0;
            }
            .sidebar, header, .add-item-form, .btn-delete-small { 
                display: none !important; 
            }
            .main-layout {
                display: block;
            }
            .content-area, .card {
                box-shadow: none;
                border: none;
                padding: 0;
                margin: 0;
            }
            .category-group {
                border: 1px solid #ccc;
                margin-bottom: 15px;
                break-inside: avoid;
            }
            .category-header {
                background-color: #eee !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .hinweise-textarea {
                border: 1px solid #ccc;
                background: #fff;
            }
            .item-row {
                border-bottom: 1px solid #eee;
            }
            /* Farben im Druck erzwingen */
            .item-text {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Packlisten-Manager</h1>
        <p>Erstelle, kategorisiere und drucke deine Packlisten</p>
    </header>

    <div class="main-layout">
        <!-- LINKER BEREICH: Sidebar -->
        <div class="sidebar">
            <div class="card">
                <h2>Neue Liste anlegen</h2>
                <form id="newListForm">
                    <div class="form-group">
                        <label for="listName">Name der Reise / Event</label>
                        <input type="text" id="listName" placeholder="z. B. Sommerurlaub, Fußball-Camp" required>
                    </div>
                    <div class="form-group">
                        <label for="listDate">Datum</label>
                        <input type="date" id="listDate" required>
                    </div>
                    <div class="form-group">
                        <label for="listPurpose">Zweck / Kategorie</label>
                        <input type="text" id="listPurpose" placeholder="z. B. Strandurlaub, Sportturnier" required>
                    </div>
                    <button type="submit">Liste hinzufügen</button>
                </form>
            </div>

            <div class="card">
                <h2>Aktionen</h2>
                <button type="button" class="btn-print" onclick="window.print()">🖨️ Aktuelle Liste drucken</button>
                <button type="button" class="btn-secondary" onclick="exportData()">💾 Listen herunterladen</button>
                <label class="btn-upload" for="importFile">📂 Listen laden</label>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
            </div>

            <div class="card">
                <h2>Deine Packlisten</h2>
                <div id="savedListsContainer"></div>
            </div>
        </div>

        <!-- RECHTER BEREICH: Aktive Packliste -->
        <div class="content-area" id="activeListWrapper">
            <div class="no-selection-notice" id="noSelectionNotice">
                Wähle links eine Packliste aus oder erstelle eine neue.
            </div>
            
            <div id="activeListContent" style="display: none;">
                <div class="card">
                    <div class="list-header-details">
                        <h2 id="activeTitle" style="border: none; margin-bottom: 5px; font-size: 18pt;">-</h2>
                        <div class="list-tags">
                            <div class="tag-block">Datum: <strong id="activeDate">-</strong></div>
                            <div class="tag-block">Zweck: <strong id="activePurpose">-</strong></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="activeNotes">Wichtige Hinweise & Notizen</label>
                        <textarea id="activeNotes" class="hinweise-textarea" placeholder="Hier wichtige Infos eintragen..."></textarea>
                    </div>
                </div>

                <div class="card">
                    <h2>Gegenstände hinzufügen</h2>
                    
                    <form id="addItemForm" class="add-item-form">
                        <div class="add-item-row">
                            <input type="text" id="newItemName" placeholder="Was möchtest du einpacken?" required>
                            <select id="newItemCategory">
                                <option value="Allgemein">Allgemein</option>
                                <option value="Kleidung">Kleidung</option>
                                <option value="Hygiene">Hygiene & Bad</option>
                                <option value="Elektronik">Elektronik</option>
                                <option value="Sportausrüstung">Sportausrüstung</option>
                                <option value="Dokumente">Dokumente / Geld</option>
                            </select>
                        </div>
                        <div class="add-item-row" style="justify-content: space-between; align-items: center; margin-top: 5px;">
                            <div class="color-selector" id="colorSelector">
                                <span style="font-size: 9pt; font-weight: bold; margin-right: 5px;">Farbe:</span>
                                <div class="color-btn selected" style="background-color: var(--item-color-default);" data-color="var(--item-color-default)"></div>
                                <div class="color-btn" style="background-color: var(--item-color-red);" data-color="var(--item-color-red)"></div>
                                <div class="color-btn" style="background-color: var(--item-color-blue);" data-color="var(--item-color-blue)"></div>
                                <div class="color-btn" style="background-color: var(--item-color-green);" data-color="var(--item-color-green)"></div>
                                <div class="color-btn" style="background-color: var(--item-color-orange);" data-color="var(--item-color-orange)"></div>
                                <div class="color-btn" style="background-color: var(--item-color-purple);" data-color="var(--item-color-purple)"></div>
                            </div>
                            <button type="submit">Hinzufügen</button>
                        </div>
                    </form>

                    <div id="itemsListContainer">
                    </div>
                    
                    <div id="itemsEmptyState" class="empty-state" style="display: none;">
                        Noch keine Gegenstände auf dieser Liste.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let packlisten = JSON.parse(localStorage.getItem('packlisten_v2')) || [];
    let activeListId = null;
    let selectedColor = 'var(--item-color-default)';

    const newListForm = document.getElementById('newListForm');
    const savedListsContainer = document.getElementById('savedListsContainer');
    const activeListContent = document.getElementById('activeListContent');
    const noSelectionNotice = document.getElementById('noSelectionNotice');
    
    const activeTitle = document.getElementById('activeTitle');
    const activeDate = document.getElementById('activeDate');
    const activePurpose = document.getElementById('activePurpose');
    const activeNotes = document.getElementById('activeNotes');
    
    const addItemForm = document.getElementById('addItemForm');
    const newItemName = document.getElementById('newItemName');
    const newItemCategory = document.getElementById('newItemCategory');
    const itemsListContainer = document.getElementById('itemsListContainer');
    const itemsEmptyState = document.getElementById('itemsEmptyState');
    const colorBtns = document.querySelectorAll('.color-btn');

    colorBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            colorBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = btn.getAttribute('data-color');
        });
    });

    function init() {
        renderSidebar();
        if (packlisten.length > 0) {
            selectList(packlisten[0].id);
        } else {
            showEmptyState();
        }
    }

    function saveData() {
        localStorage.setItem('packlisten_v2', JSON.stringify(packlisten));
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function renderSidebar() {
        savedListsContainer.innerHTML = '';
        if (packlisten.length === 0) {
            savedListsContainer.innerHTML = '<div class="empty-state" style="padding: 15px;">Keine Listen vorhanden.</div>';
            return;
        }

        packlisten.forEach(list => {
            const div = document.createElement('div');
            div.className = `list-selector-item ${list.id === activeListId ? 'active' : ''}`;
            
            div.addEventListener('click', (e) => {
                if (e.target.closest('.btn-delete-small')) return;
                selectList(list.id);
            });

            div.innerHTML = `
                <div class="info">
                    <div class="title">${escapeHTML(list.name)}</div>
                    <div class="meta">${formatDate(list.date)} | ${escapeHTML(list.purpose)}</div>
                </div>
                <button type="button" class="btn-delete-small" title="Liste löschen">✕</button>
            `;

            div.querySelector('.btn-delete-small').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteList(list.id);
            });

            savedListsContainer.appendChild(div);
        });
    }

    function selectList(id) {
        activeListId = id;
        const list = packlisten.find(l => l.id === id);
        
        if (!list) {
            showEmptyState();
            return;
        }

        noSelectionNotice.style.display = 'none';
        activeListContent.style.display = 'block';

        activeTitle.textContent = list.name;
        activeDate.textContent = formatDate(list.date);
        activePurpose.textContent = list.purpose;
        activeNotes.value = list.notes || '';

        renderItems(list);
        renderSidebar();
    }

    function showEmptyState() {
        activeListId = null;
        noSelectionNotice.style.display = 'flex';
        activeListContent.style.display = 'none';
        renderSidebar();
    }

    function renderItems(list) {
        itemsListContainer.innerHTML = '';
        if (!list.items || list.items.length === 0) {
            itemsEmptyState.style.display = 'block';
            return;
        }
        itemsEmptyState.style.display = 'none';

        const categorizedItems = {};
        list.items.forEach(item => {
            const cat = item.category || 'Allgemein';
            if (!categorizedItems[cat]) categorizedItems[cat] = [];
            categorizedItems[cat].push(item);
        });

        const sortedCategories = Object.keys(categorizedItems).sort();

        sortedCategories.forEach(category => {
            const catGroup = document.createElement('div');
            catGroup.className = 'category-group';
            
            const catHeader = document.createElement('div');
            catHeader.className = 'category-header';
            catHeader.textContent = category;
            catGroup.appendChild(catHeader);

            const ul = document.createElement('ul');
            ul.className = 'items-list';

            categorizedItems[category].forEach(item => {
                const li = document.createElement('li');
                li.className = `item-row ${item.packed ? 'packed' : ''}`;
                
                const textColor = item.color || 'var(--item-color-default)';

                li.innerHTML = `
                    <div class="item-left">
                        <input type="checkbox" ${item.packed ? 'checked' : ''}>
                        <span class="item-text" style="color: ${textColor}">${escapeHTML(item.name)}</span>
                    </div>
                    <button type="button" class="btn-delete-small" title="Gegenstand entfernen">✕</button>
                `;

                const checkbox = li.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('change', () => toggleItemPacked(list.id, item.id));
                
                li.querySelector('.item-left').addEventListener('click', (e) => {
                    if (e.target !== checkbox) {
                        checkbox.checked = !checkbox.checked;
                        toggleItemPacked(list.id, item.id);
                    }
                });

                li.querySelector('.btn-delete-small').addEventListener('click', () => deleteItem(list.id, item.id));

                ul.appendChild(li);
            });

            catGroup.appendChild(ul);
            itemsListContainer.appendChild(catGroup);
        });
    }

    newListForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = 'list-' + Date.now();
        const newList = {
            id: id,
            name: document.getElementById('listName').value,
            date: document.getElementById('listDate').value,
            purpose: document.getElementById('listPurpose').value,
            notes: '',
            items: []
        };

        packlisten.push(newList);
        saveData();
        newListForm.reset();
        selectList(id);
    });

    function deleteList(id) {
        if (confirm('Möchtest du diese Packliste wirklich löschen?')) {
            packlisten = packlisten.filter(l => l.id !== id);
            saveData();
            if (activeListId === id) {
                if (packlisten.length > 0) {
                    selectList(packlisten[0].id);
                } else {
                    showEmptyState();
                }
            } else {
                renderSidebar();
            }
        }
    }

    addItemForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!activeListId) return;

        const list = packlisten.find(l => l.id === activeListId);
        if (list) {
            const newItem = {
                id: 'item-' + Date.now(),
                name: newItemName.value,
                category: newItemCategory.value,
                color: selectedColor,
                packed: false
            };
            if (!list.items) list.items = [];
            list.items.push(newItem);
            saveData();
            newItemName.value = '';
            colorBtns[0].click(); 
            renderItems(list);
        }
    });

    function toggleItemPacked(listId, itemId) {
        const list = packlisten.find(l => l.id === listId);
        if (list && list.items) {
            const item = list.items.find(i => i.id === itemId);
            if (item) {
                item.packed = !item.packed;
                saveData();
                renderItems(list);
            }
        }
    }

    function deleteItem(listId, itemId) {
        const list = packlisten.find(l => l.id === listId);
        if (list && list.items) {
            list.items = list.items.filter(i => i.id !== itemId);
            saveData();
            renderItems(list);
        }
    }

    activeNotes.addEventListener('input', () => {
        if (!activeListId) return;
        const list = packlisten.find(l => l.id === activeListId);
        if (list) {
            list.notes = activeNotes.value;
            saveData();
        }
    });

    function exportData() {
        if (packlisten.length === 0) {
            alert('Du hast noch keine Listen erstellt, die du speichern könntest.');
            return;
        }
        const dataStr = JSON.stringify(packlisten);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = 'meine_packlisten_v2.json';

        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        document.body.appendChild(linkElement);
        linkElement.click();
        document.body.removeChild(linkElement);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    importedData.forEach(list => {
                        if (list.items) {
                            list.items.forEach(item => {
                                if (!item.category) item.category = 'Allgemein';
                                if (!item.color) item.color = 'var(--item-color-default)';
                            });
                        }
                    });
                    
                    packlisten = importedData;
                    saveData();
                    init();
                    alert('Packlisten erfolgreich geladen!');
                } else {
                    alert('Die Datei hat das falsche Format.');
                }
            } catch (err) {
                alert('Fehler beim Lesen der Datei. Bitte lade nur die korrekte JSON-Datei hoch.');
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    init();
</script>

</body>
</html>
